name: Engagement Polls

on:
  schedule:
    - cron: '40 14 * * *'   # 17:40 МСК — после BTC-анализа
  workflow_dispatch:

jobs:
  send-poll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Отправить опрос
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python polls.py btc_analysis
