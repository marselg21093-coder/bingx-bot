name: BingX Telegram Auto-Poster

on:
  workflow_dispatch:       # Кнопка ручного запуска в GitHub

jobs:
  send-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Определить тип поста по времени
        id: post-type
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "05" ]; then
            echo "type=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "10" ]; then
            echo "type=afternoon" >> $GITHUB_OUTPUT
          else
            echo "type=evening" >> $GITHUB_OUTPUT
          fi

      - name: Отправить пост
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python post.py ${{ steps.post-type.outputs.type }}
