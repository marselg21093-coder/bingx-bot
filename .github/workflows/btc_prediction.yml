name: BTC Prediction

on:
  workflow_dispatch:         # Кнопка ручного запуска

jobs:
  btc-prediction:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # Нужно для git commit кэша

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests anthropic pillow

      - name: Запустить прогноз
        env:
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python btc_prediction.py

      - name: Сохранить кэш в репозиторий
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/btc_prediction.json
          git diff --staged --quiet || git commit -m "chore: update btc prediction cache [skip ci]"
          git push
